$schema: https://json-schema.org/draft/2020-12/schema
$id: https://kroxylicious.io/doc-schema.yaml
title: Kroxylicious documentation metadata schema
description: The schema for Kroxylicious documentation metadata (`doc.yaml`)
type: object
required:
  - title
  - description
properties:
  title:
    description: The name of this document.
    type: string
  description:
    description: |
      A description of this document. This should be one or more complete sentences, ending with punctuation.
      For Quick State guides, the first sentence should begin "Start here ...".
      For other guides the suggested pattern is to begin the first sentence with a present participle, and 
      to keep it task-oriented. For example, "Using the Foo to frobnicate a bar."
    type: string
    pattern: (.|\r?\n)*[.!?]
  tags:
    description: Tags to associate with this document
    type: array
    items:
      description: The allowed tags for documents
      type: string
      enum:
        - proxy
        - developer
        - filter
        - kubernetes
        - security
        - governance
  path:
    description: |
      Optional URL pointing to the documentation. Relative paths are interpreted as relative to the 
      base documentation URL for this release.
    type: string
  rank:
    description: |
      A string for the lexicographic ordering of documents
    type: string