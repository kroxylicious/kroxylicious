services:
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    # No host port mapping — client connects via Docker network.
    # Envoy listens on 49192-49195 inside the container (same ports
    # Kroxylicious advertises), and forwards to Kroxylicious on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Run Kafka CLI tools through Envoy to test PROXY protocol.
  # Usage:
  #   docker compose run --rm kafka-client kafka-topics --bootstrap-server envoy:49192 --list
  #   docker compose run --rm kafka-client kafka-console-producer --bootstrap-server envoy:49192 --topic test
  #   docker compose run --rm kafka-client kafka-console-consumer --bootstrap-server envoy:49192 --topic test --from-beginning
  kafka-client:
    image: apache/kafka:latest
    entrypoint: []
    environment:
      PATH: "/opt/kafka/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    command: ["sleep", "infinity"]
    profiles: ["tools"]
