#
# Kroxylicious config for use with the Envoy PROXY protocol test setup.
#
# Kroxylicious binds on ports 49192-49194 on the host.
# Envoy (Docker) listens on the same ports inside the container
# and forwards with PROXY protocol v2 headers.
#
# Clients run inside Docker and connect to envoy:49192.
# Metadata responses advertise "envoy" as the hostname so the client
# resolves broker addresses to the Envoy container.
#
---
proxyProtocol:
  mode: allowed
management:
  port: 19090
  endpoints:
    prometheus: {}
virtualClusters:
  - name: demo
    targetCluster:
      bootstrapServers: localhost:62496
    gateways:
      - name: through-envoy
        portIdentifiesNode:
          bootstrapAddress: localhost:49192
          advertisedBrokerAddressPattern: envoy # behind envoy; envoy
          nodeStartPort: 49193
          nodeIdRanges:
            - name: default
              start: 0
              end: 1
      - name: direct
        portIdentifiesNode:
          bootstrapAddress: localhost:39192
          advertisedBrokerAddressPattern: localhost
          nodeStartPort: 39193
          nodeIdRanges:
              - name: default
                start: 0
                end: 1
    logNetwork: false
    logFrames: false
