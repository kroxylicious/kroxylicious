---
resource:
  kind: KafkaProxy
  apiVersion: kroxylicious.io/v1alpha1
  metadata:
    name: invalid-network-threads
    namespace: proxy-ns
  spec:
    network:
      proxy:
        workerThreadCount: 0
expectFailureMessageToContain: |
  spec.network.proxy.workerThreadCount
