---
kind: KafkaProxy
apiVersion: kroxylicious.io/v1alpha1
metadata:
  name: valid-network-settings
  namespace: proxy-ns
spec:
  network:
    proxy:
      workerThreadCount: 4
      shutdownQuietPeriod: "2s"
      authenticatedIdleTimeout: "10m"
      unauthenticatedIdleTimeout: "30s"
    management:
      workerThreadCount: 2
      shutdownQuietPeriod: "5s"