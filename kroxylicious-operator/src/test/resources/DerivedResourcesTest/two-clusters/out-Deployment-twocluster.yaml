---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  labels:
    app: "kroxylicious"
    app.kubernetes.io/part-of: "kafka"
    app.kubernetes.io/managed-by: "kroxylicious-operator"
    app.kubernetes.io/name: "kroxylicious-proxy"
    app.kubernetes.io/instance: "twocluster"
    app.kubernetes.io/component: "proxy"
  name: "twocluster"
  namespace: "proxy-ns"
  ownerReferences:
    - apiVersion: "kroxylicious.io/v1alpha1"
      kind: "KafkaProxy"
      name: "twocluster"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "kroxylicious"
      app.kubernetes.io/part-of: "kafka"
      app.kubernetes.io/managed-by: "kroxylicious-operator"
      app.kubernetes.io/name: "kroxylicious-proxy"
      app.kubernetes.io/instance: "twocluster"
      app.kubernetes.io/component: "proxy"
  template:
    metadata:
      labels:
        app: "kroxylicious"
        app.kubernetes.io/part-of: "kafka"
        app.kubernetes.io/managed-by: "kroxylicious-operator"
        app.kubernetes.io/name: "kroxylicious-proxy"
        app.kubernetes.io/instance: "twocluster"
        app.kubernetes.io/component: "proxy"
    spec:
      containers:
        - name: "proxy"
          image: "quay.io/kroxylicious/kroxylicious:test"
          args:
            - "--config"
            - "/opt/kroxylicious/config/proxy-config.yaml"
          ports:
            - containerPort: 9190
              name: "metrics"
            - containerPort: 9292
              name: "9292-bootstrap"
            - containerPort: 9293
              name: "9293-node"
            - containerPort: 9294
              name: "9294-node"
            - containerPort: 9295
              name: "9295-node"
            - containerPort: 9296
              name: "9296-bootstrap"
            - containerPort: 9297
              name: "9297-node"
            - containerPort: 9298
              name: "9298-node"
            - containerPort: 9299
              name: "9299-node"
          volumeMounts:
            - mountPath: "/opt/kroxylicious/config/proxy-config.yaml"
              name: "config-volume"
              subPath: "proxy-config.yaml"
      volumes:
        - name: "config-volume"
          secret:
            secretName: "twocluster"