# Note the v1 in the filename refers to the version of the CustomResourceDefinition
# not any of the versions of API being defined.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # name must match the spec fields below, and be in the form: <plural>.<group>
  name: kafkaproxyingresses.kroxylicious.io
spec:
  # group name to use for REST API: /apis/<group>/<version>
  group: kroxylicious.io
  scope: Namespaced
  names:
    plural: kafkaproxyingresses
    singular: kafkaproxyingress
    kind: KafkaProxyIngress
    shortNames:
      - kpi
  # list of versions supported by this CustomResourceDefinition
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: { }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            metadata:
              type: object
            spec:
              type: object
              required: ["proxyRef", "clusterIP"]
              properties:
                proxyRef:
                  type: object
                  required: [ "name" ]
                  properties:
                    group:
                      type: string
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    kind:
                      type: string
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                    name:
                      maxLength: 253
                      minLength: 1
                      type: string
                clusterIP:
                  type: object
                  required: [ "protocol" ]
                  properties:
                    protocol:
                      type: string
                      enum: ["TCP"]
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 9082