---
Configuration:
  status: WARN
  name: Config
  Appenders:
    Console:
      # Pattern layout appender (text format - current default)
      - name: STDOUT-PATTERN
        target: SYSTEM_OUT
        PatternLayout:
          pattern: "%d{yyyy-MM-dd HH:mm:ss} %-5p <%t> %c{2.}:%L - %m%replace{ %K{ctx}}{' $'}{}%n"
      # JSON layout appender (structured JSON output)
      - name: STDOUT-JSON
        target: SYSTEM_OUT
        JsonTemplateLayout:
          eventTemplateUri: "${env:KROXYLICIOUS_LOG_JSON_TEMPLATE:-classpath:LogstashJsonEventLayoutV1.json}"
    # Routing appender - selects between Pattern and JSON based on env var
    Routing:
      name: STDOUT
      Routes:
        pattern: "${env:KROXYLICIOUS_LOG_FORMAT:-text}"
        Route:
          - key: json
            ref: STDOUT-JSON
          - key: text
            ref: STDOUT-PATTERN
  Loggers:
    Root:
      level: "${env:KROXYLICIOUS_ROOT_LOG_LEVEL:-WARN}"
      additivity: false
      AppenderRef:
        - ref: STDOUT
    Logger:
      - name: io.kroxylicious
        level: "${env:KROXYLICIOUS_APP_LOG_LEVEL:-${env:KROXYLICIOUS_ROOT_LOG_LEVEL:-INFO}}"
        additivity: false
        AppenderRef:
          - ref: STDOUT
      - name: io.javaoperatorsdk
        level: INFO
        additivity: false
        AppenderRef:
          - ref: STDOUT
      - name: io.fabric8
        level: INFO
        additivity: false
        AppenderRef:
          - ref: STDOUT
      - name: io.fabric8.kubernetes.client.http
        level: INFO
        additivity: false
        AppenderRef:
          - ref: STDOUT
