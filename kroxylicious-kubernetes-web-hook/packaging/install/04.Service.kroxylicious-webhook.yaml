apiVersion: v1
kind: Service
metadata:
  name: kroxylicious-webhook
  namespace: kroxylicious-webhook
  labels:
    app.kubernetes.io/name: kroxylicious
    app.kubernetes.io/component: webhook
spec:
  ports:
    - name: webhook
      port: 443
      targetPort: 8443
      protocol: TCP
  selector:
    app: kroxylicious-webhook
