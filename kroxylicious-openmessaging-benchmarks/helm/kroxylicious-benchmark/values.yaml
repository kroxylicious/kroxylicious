# Scenario name - used in OMB result filenames to identify which scenario produced the results
scenario: baseline

# Kafka cluster configuration (Strimzi-based)
kafka:
  replicas: 3
  version: "4.1.1"  # Kafka version for Strimzi
  # Replication settings (defaults match replica count for safety)
  replicationFactor: 3  # Should be <= replicas
  minInSyncReplicas: 2  # Should be < replicationFactor
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  storage:
    size: "100Gi"
    storageClass: ""  # Use default storage class

# Kroxylicious proxy (enabled for proxy scenarios)
# Requires the Kroxylicious operator to be installed in the cluster.
# When enabled, the chart creates operator CRs (KafkaProxy, KafkaProxyIngress,
# KafkaService, VirtualKafkaCluster) and the operator manages the proxy deployment.
kroxylicious:
  enabled: false  # Disabled for baseline scenario
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# HashiCorp Vault (for encryption scenarios)
vault:
  enabled: false
  image: hashicorp/vault:1.21.4@sha256:4e33b126a59c0c333b76fb4e894722462659a6bec7c48c9ee8cea56fccfd2569
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"

# OpenMessaging Benchmark workers
omb:
  workerReplicas: 3
  image: quay.io/kroxylicious/kroxylicious-omb:omb-8559989-krox-e329e4d-2@sha256:addb5ed87a1d1ed87e0a2df9223c25b33d25bf8331709c1d372124420572fe3c
  imagePullPolicy: IfNotPresent
  driver: baseline  # Can be 'baseline' or 'proxy'
  workload: 1topic-1kb  # Workload name to run
  workerJavaOpts: "-XX:MaxRAMPercentage=50"  # JVM opts for OMB workers
  logLevel: warn  # SLF4J SimpleLogger log level (debug, info, warn, error)
  createBenchmarkJob: false  # Job is created explicitly by run-benchmark.sh; not managed by Helm install
  coordinatorProducerRate: ""  # Producer rate override injected per-probe; empty uses workload default
  # Coordinator heap sizing passed as HEAP_OPTS to the OMB launcher script.
  # The coordinator is an orchestrator only — workers do the actual producing/consuming.
  coordinatorHeapOpts: "-Xms512m -Xmx1g"
  resultsPvcName: "omb-results"  # PVC for result JSON; not Helm-managed, persists across runs
  # Resources for the OMB coordinator (Job pod). Sized for 1 GB heap + native overhead.
  coordinator:
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  # Resources for each OMB worker (StatefulSet pods). Workers run producers and
  # consumers — less JVM startup overhead than the coordinator.
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"
      cpu: "1000m"

# Benchmark configuration
# Defaults are production-quality: 15 min test + 5 min warmup gives reliable p99.9 latency
# at 50K msg/sec (~45M samples). Use scenarios/smoke-values.yaml for quick validation.
benchmark:
  testDurationMinutes: 15
  warmupDurationMinutes: 5
  producerRate: 50000
