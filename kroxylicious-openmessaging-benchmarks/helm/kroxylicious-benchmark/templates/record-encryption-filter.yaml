apiVersion: kroxylicious.io/v1alpha1
kind: KafkaProtocolFilter
metadata:
  name: record-encryption
spec:
  type: io.kroxylicious.filter.encryption.RecordEncryption
  configTemplate:
    kms: {{ .Values.encryption.kms.type }}
    kmsConfig:
      {{- toYaml .Values.encryption.kms.config | nindent 6 }}
    selector: io.kroxylicious.filter.encryption.TemplateKekSelector
    selectorConfig:
      template: {{ .Values.encryption.kekName | quote }}
{{- end }}
