# Patches the proxy Deployment to enable JFR recording.
#
# - Mounts an emptyDir at /tmp so the JFR recording is written to pod-local storage.
#   run-benchmark.sh copies the file from the live pod via kubectl exec before teardown.
#   Using emptyDir (rather than a PVC) avoids local-PV node-affinity constraints that
#   can deadlock scheduling when anti-affinity rules are also in play.
# - Sets JAVA_TOOL_OPTIONS to start a JFR recording at JVM startup.
#   After the benchmark completes, run-benchmark.sh uses jcmd JFR.stop to write
#   the recording to /tmp/benchmark.jfr while the proxy pod is still running.
#
# The PROXY_DEPLOYMENT, NAMESPACE, and JFR_MAX_SIZE placeholders are substituted
# by the script using envsubst before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${PROXY_DEPLOYMENT}
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      volumes:
      - name: jfr-tmp
        emptyDir: {}
      containers:
      - name: proxy
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:StartFlightRecording=name=benchmark,settings=profile,maxsize=${JFR_MAX_SIZE},disk=true,filename=/tmp/benchmark.jfr"
        volumeMounts:
        - name: jfr-tmp
          mountPath: /tmp
