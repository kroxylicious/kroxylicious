# Patches the proxy Deployment to enable JFR recording.
#
# - Mounts a PVC at /tmp so the JFR recording survives pod termination and can
#   be collected after the proxy has been scaled to zero.
# - Sets JAVA_TOOL_OPTIONS to start a JFR recording at JVM startup.
#   After the benchmark completes, run-benchmark.sh uses jcmd JFR.dump to write
#   the recording to /tmp/benchmark.jfr while the proxy pod is still running.
#
# The PROXY_DEPLOYMENT, NAMESPACE, JFR_PVC_NAME, and JFR_MAX_SIZE placeholders
# are substituted by the script using envsubst before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${PROXY_DEPLOYMENT}
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      volumes:
      - name: jfr-tmp
        persistentVolumeClaim:
          claimName: ${JFR_PVC_NAME}
      containers:
      - name: proxy
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:StartFlightRecording=name=benchmark,settings=profile,maxsize=${JFR_MAX_SIZE},disk=true,filename=/tmp/benchmark.jfr"
        volumeMounts:
        - name: jfr-tmp
          mountPath: /tmp
