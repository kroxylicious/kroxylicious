---
metadata:
  apiKeys: "CONSUMER_GROUP_DESCRIBE"
  apiVersion: 0
  scenario: |
    when all groups in the request do not have DESCRIBE authorized
    then we respond with error with GROUP_AUTHORIZED_FAILED error set
given:
  mockedUpstreamResponses: []
  authorizerRules:
    allowed: # not allowed to DESCRIBE GROUP my-group
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "DESCRIBE"
  topicNames: { }
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 69
    requestApiVersion: 0
    correlationId: 1
    clientId: "client-id"
  request:
    groupIds:
      - "my-group"
    includeAuthorizedOperations: false
then:
  expectedResponseHeader:
    correlationId: 1
  expectedErrorResponse: GROUP_AUTHORIZATION_FAILED