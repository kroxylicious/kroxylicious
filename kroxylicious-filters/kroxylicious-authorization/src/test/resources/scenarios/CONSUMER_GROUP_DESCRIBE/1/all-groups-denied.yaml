---
metadata:
  apiKeys: "CONSUMER_GROUP_DESCRIBE"
  apiVersion: 1
  scenario: |
    when all groups in the request do not have DESCRIBE authorized
    then we respond with error with GROUP_AUTHORIZED_FAILED error set
given:
  mockedUpstreamResponses: []
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "DESCRIBE"
  topicNames: {}
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 69
    requestApiVersion: 1
    correlationId: 1
    clientId: "client-id"
  request:
    groupIds:
      - "my-group"
    includeAuthorizedOperations: true
then:
  expectedResponseHeader:
    correlationId: 1
  expectedErrorResponse: GROUP_AUTHORIZATION_FAILED