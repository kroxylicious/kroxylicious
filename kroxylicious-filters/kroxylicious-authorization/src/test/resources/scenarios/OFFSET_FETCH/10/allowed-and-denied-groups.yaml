---
metadata:
  apiKeys: "OFFSET_FETCH"
  apiVersion: 10
  scenario: "baseline"
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "OFFSET_FETCH"
      expectedRequestVersion: 10
      expectedRequestHeader:
        requestApiKey: 9
        requestApiVersion: 10
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        groups:
          - groupId: "my-group"
            memberId: "random-string-641"
            memberEpoch: 990
            topics:
              - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
                partitionIndexes:
                  - 639
        requireStable: false
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        throttleTimeMs: 712
        groups:
          - groupId: "my-group"
            topics:
              - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
                partitions:
                  - partitionIndex: 65
                    committedOffset: 845
                    committedLeaderEpoch: 240
                    metadata: "random-string-576"
                    errorCode: 1010
            errorCode: 162
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "DESCRIBE"
      - subject: "alice"
        resourceName: "my-group"
        resourceClass: "GROUP"
        resourceType: "DESCRIBE"
  topicNames:
    "6wZQe3j9QSO02xct4Ph0gA": "my-topic"
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 9
    requestApiVersion: 10
    correlationId: 1
    clientId: "clientId"
  request:
    groups:
      - groupId: "my-group"
        memberId: "random-string-641"
        memberEpoch: 990
        topics:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitionIndexes:
              - 639
      - groupId: "denied-group"
        memberId: "random-string-642"
        memberEpoch: 991
        topics:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitionIndexes:
              - 639
    requireStable: false
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 712
    groups:
      - groupId: "my-group"
        topics:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitions:
              - partitionIndex: 65
                committedOffset: 845
                committedLeaderEpoch: 240
                metadata: "random-string-576"
                errorCode: 1010
        errorCode: 162
      - groupId: "denied-group"
        topics: []
        errorCode: 30 # group authorization failed
  expectedAuditActions:
    - action: Describe
      objectRef:
        "io.kroxylicious.filter.authorization.TopicResource" : "my-topic"
      status: null
    - action: Describe
      objectRef:
        "io.kroxylicious.filter.authorization.GroupResource" : "my-group"
      status: null
    - action: Describe
      objectRef:
        "io.kroxylicious.filter.authorization.GroupResource" : "denied-group"
      status: "denied"