---
metadata:
  apiKeys: "FETCH"
  apiVersion: 18
  scenario: |
    when all topicIds in request cannot be mapped to names
    then we short-circuit respond with error response
given:
  mockedUpstreamResponses: []
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "READ"
  topicNames: null # no topic ids mapped
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 1
    requestApiVersion: 18
    correlationId: 1
    clientId: "clientId"
  request:
    maxWaitMs: 631
    minBytes: 576
    maxBytes: 658
    isolationLevel: 5
    sessionId: 267
    sessionEpoch: 603
    topics:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA" # topic name mapping fails
        partitions:
          - partition: 549
            currentLeaderEpoch: 609
            fetchOffset: 402
            lastFetchedEpoch: 645
            logStartOffset: 742
            partitionMaxBytes: 944
    forgottenTopicsData:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA"
        partitions:
          - 563
    rackId: "random-string-474"
then:
  expectedResponseHeader:
    correlationId: 1
  expectAuthorizationOutcomeLog: false
  expectedResponse:
    throttleTimeMs: 0
    errorCode: 0
    sessionId: 0
    responses:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA"
        partitions:
          - partitionIndex: 549
            errorCode: -1 # UNKNOWN_SERVER_ERROR, the code the test framework sets for the unmapped topic
            highWatermark: -1
            lastStableOffset: -1
            logStartOffset: -1
            abortedTransactions: [ ]
            preferredReadReplica: -1
            records: !!binary ""
