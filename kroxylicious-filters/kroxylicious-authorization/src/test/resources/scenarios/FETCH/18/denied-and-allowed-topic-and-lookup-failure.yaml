---
metadata:
  apiKeys: "FETCH"
  apiVersion: 18
  scenario: |
    request contains some allowed topics and some denied
    request contains a topicId that cannot be mapped to a nme
    allowed topics are forwarded upstream
    denied topics are not forwarded upstream
    topicId mapping failed topics are not forwarded upstream
    denied topic errors are augmented into response to client
    topicId mapping failure errors are augmented into response to client
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "FETCH"
      expectedRequestVersion: 18
      expectedRequestHeader:
        requestApiKey: 1
        requestApiVersion: 18
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        maxWaitMs: 631
        minBytes: 576
        maxBytes: 658
        isolationLevel: 5
        sessionId: 267
        sessionEpoch: 603
        topics:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitions:
              - partition: 549
                currentLeaderEpoch: 609
                fetchOffset: 402
                lastFetchedEpoch: 645
                logStartOffset: 742
                partitionMaxBytes: 944
        forgottenTopicsData:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitions:
              - 563
        rackId: "random-string-474"
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        throttleTimeMs: 18
        errorCode: 856
        sessionId: 885
        responses:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitions:
              - partitionIndex: 647
                errorCode: 575
                highWatermark: 339
                lastStableOffset: 551
                logStartOffset: 596
                abortedTransactions:
                  - producerId: 287
                    firstOffset: 914
                preferredReadReplica: 22
                records: !!binary ""
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "READ"
  topicNames:
    "6wZQe3j9QSO02xct4Ph0gA": "my-topic"
    "2VJlngPmSGi69WMsWRVrOw": "unauthorized"
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 1
    requestApiVersion: 18
    correlationId: 1
    clientId: "clientId"
  request:
    maxWaitMs: 631
    minBytes: 576
    maxBytes: 658
    isolationLevel: 5
    sessionId: 267
    sessionEpoch: 603
    topics:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
        partitions:
          - partition: 549
            currentLeaderEpoch: 609
            fetchOffset: 402
            lastFetchedEpoch: 645
            logStartOffset: 742
            partitionMaxBytes: 944
      - topicId: "2VJlngPmSGi69WMsWRVrOw" # maps to topic named 'unauthorized'
        partitions:
          - partition: 549
            currentLeaderEpoch: 609
            fetchOffset: 402
            lastFetchedEpoch: 645
            logStartOffset: 742
            partitionMaxBytes: 944
      - topicId: "sNxDYvXAQne6fpYrpGFsfQ" # has no topic name mapping
        partitions:
          - partition: 549
            currentLeaderEpoch: 609
            fetchOffset: 402
            lastFetchedEpoch: 645
            logStartOffset: 742
            partitionMaxBytes: 944
    forgottenTopicsData:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
        partitions:
          - 563
    rackId: "random-string-474"
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 18
    errorCode: 856
    sessionId: 885
    responses:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
        partitions:
          - partitionIndex: 647
            errorCode: 575
            highWatermark: 339
            lastStableOffset: 551
            logStartOffset: 596
            abortedTransactions:
              - producerId: 287
                firstOffset: 914
            preferredReadReplica: 22
            records: !!binary ""
      - topicId: "2VJlngPmSGi69WMsWRVrOw" # maps to topic named 'unauthorized'
        partitions:
          - partitionIndex: 549
            errorCode: 29
            highWatermark: -1
            lastStableOffset: -1
            logStartOffset: -1
            abortedTransactions: [ ]
            preferredReadReplica: -1
            records: !!binary ""
      - topicId: "sNxDYvXAQne6fpYrpGFsfQ" # has no topic name mapping
        partitions:
          - partitionIndex: 549
            errorCode: -1 # UNKNOWN_SERVER_ERROR, the code the test framework sets for the unmapped topic
            highWatermark: -1
            lastStableOffset: -1
            logStartOffset: -1
            abortedTransactions: [ ]
            preferredReadReplica: -1
            records: !!binary ""
  expectedAuditActions:
    - action: "Read"
      objectRef:
        "io.kroxylicious.filter.authorization.TopicResource": "my-topic"
      status: null
    - action: "Read"
      objectRef:
        "io.kroxylicious.filter.authorization.TopicResource": "unauthorized"
      status: "denied"