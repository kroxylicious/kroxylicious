---
metadata:
  apiKeys: "FETCH"
  apiVersion: 18
  scenario: "all topics in request are denied. filter short circuit responds with error"
given:
  mockedUpstreamResponses: []
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "READ"
  topicNames:
    "2VJlngPmSGi69WMsWRVrOw": "unauthorized"
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 1
    requestApiVersion: 18
    correlationId: 1
    clientId: "clientId"
  request:
    maxWaitMs: 631
    minBytes: 576
    maxBytes: 658
    isolationLevel: 5
    sessionId: 267
    sessionEpoch: 603
    topics:
      - topicId: "2VJlngPmSGi69WMsWRVrOw" # maps to topic named 'unauthorized'
        partitions:
          - partition: 549
            currentLeaderEpoch: 609
            fetchOffset: 402
            lastFetchedEpoch: 645
            logStartOffset: 742
            partitionMaxBytes: 944
    forgottenTopicsData:
      - topicId: "2VJlngPmSGi69WMsWRVrOw" # maps to topic named 'unauthorized'
        partitions:
          - 563
    rackId: "random-string-474"
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 0
    errorCode: 0
    sessionId: 0
    responses:
      - topicId: "2VJlngPmSGi69WMsWRVrOw" # maps to topic named 'unauthorized'
        partitions:
          - partitionIndex: 549
            errorCode: 29
            highWatermark: -1
            lastStableOffset: -1
            logStartOffset: -1
            abortedTransactions: [ ]
            preferredReadReplica: -1
            records: !!binary ""