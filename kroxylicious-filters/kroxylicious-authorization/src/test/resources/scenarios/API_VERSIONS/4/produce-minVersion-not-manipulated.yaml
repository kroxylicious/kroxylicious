---
metadata:
  apiKeys: "API_VERSIONS"
  apiVersion: 4
  scenario: |
    we leave the minimum produce version unmanipulated because of a Kafka quirk to support older librdkafka clients
    see https://issues.apache.org/jira/browse/KAFKA-18659
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "API_VERSIONS"
      expectedRequestVersion: 4
      expectedRequestHeader:
        requestApiKey: 18
        requestApiVersion: 4
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        clientSoftwareName: "random-string-313"
        clientSoftwareVersion: "random-string-234"
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        errorCode: 45
        apiKeys:
          - apiKey: 3 # METADATA
            minVersion: 0
            maxVersion: 13
          - apiKey: 0 # PRODUCE
            minVersion: 0
            maxVersion: 9999 # unrealistically large maxVersion
        throttleTimeMs: 880
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "DESCRIBE"
  topicNames: null
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 18
    requestApiVersion: 4
    correlationId: 1
    clientId: "clientId"
  request:
    clientSoftwareName: "random-string-313"
    clientSoftwareVersion: "random-string-234"
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    errorCode: 45
    apiKeys:
      - apiKey: 3 # METADATA
        minVersion: 0
        maxVersion: 13
      - apiKey: 0 # PRODUCE
        minVersion: 0 # unmodified despite filter not supporting v0-v2
        maxVersion: 13 # max version supported by filter
    throttleTimeMs: 880
