---
metadata:
  apiKeys: "PRODUCE"
  apiVersion: 13
  scenario: "allowed topic is forwarded upstream"
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "PRODUCE"
      expectedRequestVersion: 13
      expectedRequestHeader:
        requestApiKey: 0
        requestApiVersion: 13
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        transactionalId: "my-transactional-id"
        acks: 1
        timeoutMs: 141
        topicData:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitionData:
              - index: 134
                records: !!binary ""
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        responses:
          - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
            partitionResponses:
              - index: 969
                errorCode: 51
                baseOffset: 581
                logAppendTimeMs: 693
                logStartOffset: 269
                recordErrors:
                  - batchIndex: 164
                    batchIndexErrorMessage: "random-string-410"
                errorMessage: "random-string-667"
        throttleTimeMs: 141
  authorizerRules:
    allowed:
      - subject: "alice"
        resourceName: "my-topic"
        resourceClass: "TOPIC"
        resourceType: "WRITE"
  topicNames:
    "6wZQe3j9QSO02xct4Ph0gA": "my-topic"
    "2VJlngPmSGi69WMsWRVrOw": "unauthorized"
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 0
    requestApiVersion: 13
    correlationId: 1
    clientId: "clientId"
  request:
    transactionalId: "my-transactional-id"
    acks: 1
    timeoutMs: 141
    topicData:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
        partitionData:
          - index: 134
            records: !!binary ""
      - topicId: "2VJlngPmSGi69WMsWRVrOw" # maps to topic named 'unauthorized'
        partitionData:
          - index: 134
            records: !!binary ""
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    responses:
      - topicId: "6wZQe3j9QSO02xct4Ph0gA" # maps to topic named 'my-topic'
        partitionResponses:
          - index: 969
            errorCode: 51
            baseOffset: 581
            logAppendTimeMs: 693
            logStartOffset: 269
            recordErrors:
              - batchIndex: 164
                batchIndexErrorMessage: "random-string-410"
            errorMessage: "random-string-667"
      - topicId: "AAAAAAAAAAAAAAAAAAAAAA"
        partitionResponses:
          - index: 134
            errorCode: 29
            baseOffset: 0
            logAppendTimeMs: -1
            logStartOffset: -1
            recordErrors: [ ]
            errorMessage: "Topic authorization failed."
    throttleTimeMs: 141
  expectedAuditActions:
    - action: "Write"
      objectRef:
        "io.kroxylicious.filter.authorization.TopicResource": "my-topic"
      status: null
    - action: "Write"
      objectRef:
        "io.kroxylicious.filter.authorization.TopicResource": "unauthorized"
      status: "denied"
    - action: "Write"
      objectRef:
        "io.kroxylicious.filter.authorization.TransactionalIdResource": "my-transactional-id"
      status: "denied"