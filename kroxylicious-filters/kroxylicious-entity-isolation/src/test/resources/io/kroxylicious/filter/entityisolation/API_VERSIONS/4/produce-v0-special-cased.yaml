---
metadata:
  apiKeys: "API_VERSIONS"
  apiVersion: 4
  scenario: "ensures that filters clamps the version for an API key that has an EntityIsolationProcessor"
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "API_VERSIONS"
      expectedRequestVersion: 4
      expectedRequestHeader:
        requestApiKey: 18
        requestApiVersion: 4
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        clientSoftwareName: "random-string-313"
        clientSoftwareVersion: "random-string-234"
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        errorCode: 45
        apiKeys:
          - apiKey: 0
            minVersion: 0
            maxVersion: 32767
        throttleTimeMs: 880
  topicNames: null
  resourceTypes: ["GROUP_ID"]
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 18
    requestApiVersion: 4
    correlationId: 1
    clientId: "clientId"
  request:
    clientSoftwareName: "random-string-313"
    clientSoftwareVersion: "random-string-234"
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    errorCode: 45
    apiKeys:
      - apiKey: 0 # Produce is a special case, we need to allow v0 owing to https://github.com/kroxylicious/kroxylicious/pull/2851 / KAFKA-18659
        minVersion: 0
        maxVersion: 13
    throttleTimeMs: 880
