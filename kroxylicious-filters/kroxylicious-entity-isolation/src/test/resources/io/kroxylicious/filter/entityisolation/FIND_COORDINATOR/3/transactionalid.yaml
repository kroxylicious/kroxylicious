    - expectedRequestKey: "FIND_COORDINATOR"
      expectedRequestVersion: 3
      expectedRequestHeader:
        requestApiKey: 10
        requestApiVersion: 3
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        key: alice-12345
        keyType: 1
