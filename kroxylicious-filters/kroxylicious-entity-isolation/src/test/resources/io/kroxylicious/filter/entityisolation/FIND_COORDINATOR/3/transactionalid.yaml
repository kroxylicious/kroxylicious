        correlationId: 1
      upstreamResponse:
        throttleTimeMs: 0
        errorCode: 0
        errorMessage: ""
        nodeId: 0
        host: "random-string-822"
        port: 919
  entityTypes: ["TRANSACTIONAL_ID"]
