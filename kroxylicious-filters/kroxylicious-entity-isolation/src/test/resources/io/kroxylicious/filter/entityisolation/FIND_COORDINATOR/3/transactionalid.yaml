  requestHeader:
    requestApiKey: 10
    requestApiVersion: 3
    correlationId: 1
    clientId: "clientId"
  request:
    key: "12345"
    keyType: 1
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 0
    errorCode: 0
    errorMessage: ""
    nodeId: 0
    host: "random-string-822"
