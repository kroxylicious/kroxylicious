metadata:
  apiKeys: "ADD_PARTITIONS_TO_TXN"
  apiVersion: 5
  scenario: |
    when response contains transactional id that doesn't start with 'alice-' prefix
    then those transactional ids are removed from the response
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "ADD_PARTITIONS_TO_TXN"
      expectedRequestVersion: 5
      expectedRequestHeader:
        requestApiKey: 24
        requestApiVersion: 5
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        transactions:
          - transactionalId: "alice-12345"
            producerId: 0
            producerEpoch: 0
            verifyOnly: false
            topics:
              - name: foo
                partitions: [0]
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        errorCode: 0
        resultsByTransaction:
          - transactionalId: alice-12345
            topicResults:
              - name: foo
                resultsByPartition:
                  - partitionIndex: 0
                    partitionErrorCode: 0
          - transactionalId: bob-12345
            topicResults:
              - name: foo
                resultsByPartition:
                  - partitionIndex: 0
                    partitionErrorCode: 0
        throttleTimeMs: 0
  resourceTypes: ["TRANSACTIONAL_ID"]
  topicNames: null
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 24
    requestApiVersion: 5
    correlationId: 1
    clientId: "clientId"
  request:
    transactions:
      - transactionalId: "12345"
        producerId: 0
        producerEpoch: 0
        verifyOnly: false
        topics:
          - name: foo
            partitions: [0]
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 0
    errorCode: 0
    resultsByTransaction:
      - transactionalId: "12345"
        topicResults:
          - name: foo
            resultsByPartition:
              - partitionIndex: 0
                partitionErrorCode: 0
