metadata:
  apiKeys: "DESCRIBE_GROUPS"
  apiVersion: 6
  scenario: |
    when upstream response contains a group not prefixed with 'alice-'
    then that group is removed from the response
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "DESCRIBE_GROUPS"
      expectedRequestVersion: 6
      expectedRequestHeader:
        requestApiKey: 15
        requestApiVersion: 6
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        groups: [alice-mygroup]
        includeAuthorizedOperations: false
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        throttleTimeMs: 0
        groups:
          - errorCode: 0
            errorMessage: ""
            groupId: alice-mygroup
            groupState: ""
            protocolType: ""
            protocolData: ""
            members: []
            authorizedOperations: 0
          - errorCode: 0
            errorMessage: ""
            groupId: bob-mygroup # resource not in 'alice-' namespace
            groupState: ""
            protocolType: ""
            protocolData: ""
            members: []
            authorizedOperations: 0
  entityTypes: ["GROUP_ID"]
  topicNames: null
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 15
    requestApiVersion: 6
    correlationId: 1
    clientId: "clientId"
  request:
    groups: [mygroup]
    includeAuthorizedOperations: false
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 0
    groups:
      - errorCode: 0
        errorMessage: ""
        groupId: mygroup
        groupState: ""
        protocolType: ""
        protocolData: ""
        members: []
        authorizedOperations: 0
