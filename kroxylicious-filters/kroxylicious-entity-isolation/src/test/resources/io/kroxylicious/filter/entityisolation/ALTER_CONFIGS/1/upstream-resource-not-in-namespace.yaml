metadata:
  apiKeys: "ALTER_CONFIGS"
  apiVersion: 2
  scenario: |
    when upstream responds with group that is not prefixed with 'alice-'
    then that resource is filtered out and not presented to alice.
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "ALTER_CONFIGS"
      expectedRequestVersion: 2
      expectedRequestHeader:
        requestApiKey: 33
        requestApiVersion: 2
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        resources:
          - resourceType: 2
            resourceName: "mytopic"
            configs:
              - name: "random-string-244"
                value: "random-string-752"
          - resourceType: 32
            resourceName: "alice-mygroup"
            configs:
              - name: "random-string-244"
                value: "random-string-752"
        validateOnly: false
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        throttleTimeMs: 0
        responses:
          - errorCode: 0
            errorMessage:
            resourceType: 32
            resourceName: "alice-mygroup"
          - errorCode: 0
            errorMessage:
            resourceType: 32
            resourceName: "bob-mygroup" # prefix is not alice- so we expect it to be filtered
          - errorCode: 0
            errorMessage:
            resourceType: 2
            resourceName: "mytopic"
  entityTypes: ["GROUP_ID"]
  topicNames: null
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 33
    requestApiVersion: 2
    correlationId: 1
    clientId: "clientId"
  request:
    resources:
      - resourceType: 2
        resourceName: "mytopic"
        configs:
          - name: "random-string-244"
            value: "random-string-752"
      - resourceType: 32
        resourceName: "mygroup"
        configs:
          - name: "random-string-244"
            value: "random-string-752"
    validateOnly: false
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    throttleTimeMs: 0
    responses:
      - errorCode: 0
        errorMessage:
        resourceType: 32
        resourceName: "mygroup"
      - errorCode: 0
        errorMessage:
        resourceType: 2
        resourceName: "mytopic"
