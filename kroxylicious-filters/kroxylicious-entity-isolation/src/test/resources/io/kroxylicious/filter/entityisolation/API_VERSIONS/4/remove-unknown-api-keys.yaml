---
metadata:
  apiKeys: "API_VERSIONS"
  apiVersion: 4
  scenario: "ensures that filters remove unknown api keys"
given:
  mockedUpstreamResponses:
    - expectedRequestKey: "API_VERSIONS"
      expectedRequestVersion: 4
      expectedRequestHeader:
        requestApiKey: 18
        requestApiVersion: 4
        correlationId: 1
        clientId: "clientId"
      expectedRequest:
        clientSoftwareName: "random-string-313"
        clientSoftwareVersion: "random-string-234"
      upstreamResponseHeader:
        correlationId: 1
      upstreamResponse:
        errorCode: 45
        apiKeys:
          - apiKey: 17
            minVersion: 0
            maxVersion: 1
          - apiKey: 10000 # unknown API key, is removed by filter
            minVersion: 0
            maxVersion: 32767
        throttleTimeMs: 880
  topicNames: null
  entityTypes: ["GROUP_ID"]
when:
  subject: "alice"
  requestHeader:
    requestApiKey: 18
    requestApiVersion: 4
    correlationId: 1
    clientId: "clientId"
  request:
    clientSoftwareName: "random-string-313"
    clientSoftwareVersion: "random-string-234"
then:
  expectedResponseHeader:
    correlationId: 1
  expectedResponse:
    errorCode: 45
    apiKeys:
      - apiKey: 17
        minVersion: 0
        maxVersion: 1
    throttleTimeMs: 880
