# Helm Overrides File for HashiCorp Vault used by the system tests.
server:
  image:
    repository: "mirror.gcr.io/hashicorp/vault"
    tag: 1.21.4@sha256:4e33b126a59c0c333b76fb4e894722462659a6bec7c48c9ee8cea56fccfd2569
  dev:
    enabled: true
  ha:
    enabled: false
  updateStrategyType: RollingUpdate
  service:
    type: NodePort
  extraEnvironmentVars:
    VAULT_FORMAT: json
injector:
  enabled: false

