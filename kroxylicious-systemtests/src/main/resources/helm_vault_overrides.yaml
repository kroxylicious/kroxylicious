# Helm Overrides File for HashiCorp Vault used by the system tests.
server:
  image:
    repository: "mirror.gcr.io/hashicorp/vault"
    tag: 2.0.0@sha256:e40c741ed95bb271425e3e6ca6c222d620cf8682f6f7a1b1e7c9d49d0aba484b
  dev:
    enabled: true
  ha:
    enabled: false
  updateStrategyType: RollingUpdate
  service:
    type: NodePort
  extraEnvironmentVars:
    VAULT_FORMAT: json
injector:
  enabled: false

