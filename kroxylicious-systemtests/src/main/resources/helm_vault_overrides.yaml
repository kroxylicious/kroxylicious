# Helm Overrides File for HashiCorp Vault used by the system tests.
server:
  image:
    repository: "mirror.gcr.io/hashicorp/vault"
    tag: 2.0.2@sha256:3fd53308acccd9e4e83fde3e6c6cf5b15e0f7fac1ff7510780b8b23f5e4c3de7
  dev:
    enabled: true
  ha:
    enabled: false
  updateStrategyType: RollingUpdate
  service:
    type: NodePort
  # Workaround for Vault 2.x in rootless containers (IPC_LOCK capability unavailable). Acceptable for development/testing.
  statefulSet:
    securityContext:
      container:
        capabilities:
          add:
            - IPC_LOCK
  extraEnvironmentVars:
    VAULT_FORMAT: json
injector:
  enabled: false

