# TODO This should be factored into its own maven module so that the operator and sidecar are completely independent.

# Note the v1 in the filename refers to the version of the CustomResourceDefinition
# not any of the versions of API being defined.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # name must match the spec fields below, and be in the form: <plural>.<group>
  name: kroxylicioussidecarconfigs.kroxylicious.io
spec:
  # group name to use for REST API: /apis/<group>/<version>
  group: kroxylicious.io
  scope: Namespaced
  names:
    plural: kroxylicioussidecarconfigs
    singular: kroxylicioussidecarconfig
    kind: KroxyliciousSidecarConfig
    shortNames:
      - ksc
    categories:
      - kroxylicious
  # list of versions supported by this CustomResourceDefinition
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Upstream
          # TODO All the "Upstream" in this API should be "Target", because that aligns with the terminology we use in non-Kube proxy configuration
          description: The bootstrap servers of the upstream Kafka cluster.
          jsonPath: ".spec.upstreamBootstrapServers"
          type: string
          priority: 0
      schema:
        openAPIV3Schema:
          type: object
          properties:
            metadata:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 63
                  pattern: "[a-z0-9]([a-z0-9-]*[a-z0-9])?"
            spec:
              type: object
              required:
                - upstreamBootstrapServers
              properties:
                upstreamBootstrapServers:
                  description: |
                    The bootstrap servers of the upstream Kafka cluster that the sidecar proxy
                    will forward traffic to.
                  type: string
                proxyImage:
                  description: |
                    The container image to use for the sidecar proxy. If omitted, the webhook
                    uses the image configured via the KROXYLICIOUS_IMAGE environment variable.
                  # TODO Can we reword this to avoid assuming the're a single consumer of this API which supports that env var?
                  type: string
                bootstrapPort:
                  description: |
                    The port on localhost where the sidecar proxy listens for Kafka bootstrap
                    connections. Broker ports are allocated sequentially starting from
                    bootstrapPort + 1.
                  type: integer
                  default: 19092
                  # TODO Change to 9092
                  minimum: 1024
                  maximum: 65535
                nodeIdRange:
                  description: |
                    The range of Kafka broker node IDs that the sidecar proxy will allocate
                    ports for. The number of broker ports is endInclusive - startInclusive + 1.
                  type: object
                  properties:
                    startInclusive:
                      description: The first node ID in the range (inclusive).
                      type: integer
                      default: 0
                      minimum: 0
                    endInclusive:
                      description: The last node ID in the range (inclusive).
                      type: integer
                      default: 2
                      minimum: 0
                managementPort:
                  description: |
                    The port on which the sidecar proxy exposes its management endpoints
                    (/livez, /metrics). Bound to all interfaces so that kubelet probes work.
                  type: integer
                  default: 9190
                  # TODO change to 9082
                  minimum: 1024
                  maximum: 65535
                resources:
                  description: |
                    Resource requests and limits for the sidecar proxy container.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                setBootstrapEnvVar:
                  description: |
                    Whether to set the KAFKA_BOOTSTRAP_SERVERS environment variable on
                    application containers, pointing them to the sidecar proxy.
                  type: boolean
                  default: true
                filterDefinitions:
                  description: |
                    Filter definitions applied to traffic passing through the sidecar proxy.
                    Each filter has a unique name, a type identifying the FilterFactory plugin,
                    and optional plugin-specific configuration.
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - type
                    properties:
                      name:
                        description: A unique name for this filter instance.
                        type: string
                        pattern: "[a-z0-9A-Z]([a-z0-9A-Z_.\\-]{0,251}[a-z0-9A-Z])?"
                      type:
                        description: The fully qualified type name of the FilterFactory plugin.
                        type: string
                      config:
                        description: Plugin-specific configuration for this filter.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                upstreamTls:
                  description: |
                    TLS configuration for the connection from the sidecar proxy to the upstream
                    Kafka cluster. If omitted, the proxy connects to Kafka without TLS.
                  type: object
                  properties:
                    trustAnchorSecretRef:
                      description: |
                        A reference to a Secret containing the trusted CA certificate(s) for
                        validation of the upstream Kafka broker's TLS server certificate.
                        The referenced key should contain a PEM-encoded certificate bundle.
                      type: object
                      required:
                        - name
                        - key
                      properties:
                        name:
                          description: The name of the Secret in the pod's namespace.
                          type: string
                        key:
                          description: The key within the Secret data identifying the CA certificate bundle.
                          type: string
                delegatedAnnotations:
                  description: |
                    Annotations that the application pod owner is permitted to set to override
                    sidecar configuration. Any annotation in the kroxylicious.io/ namespace
                    that is not in this list will be ignored with a warning.
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                observedGeneration:
                  description: |
                    The metadata.generation that was observed during the last reconciliation by the webhook.
                  type: integer
                conditions:
                  # Mapped to Java type io.kroxylicious.kubernetes.api.common.Condition
                  type: array
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        description: |
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.
                          If that is not known, then using the time when the API field changed is acceptable.
                        type: string
                        format: date-time
                      message:
                        description: |
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        type: string
                        default: ""
                        nullable: false
                      observedGeneration:
                        description: |
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the
                          .status.conditions[x].observedGeneration is 9, the condition is out of date with
                          respect to the current state of the instance.
                        type: integer
                        nullable: false
                      reason:
                        description: |
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        type: string
                        nullable: false
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        type: string
                        enum: [ "True", "False", "Unknown" ]
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        type: string
                    required:
                      - lastTransitionTime
                      - observedGeneration
                      - reason
                      - message
                      - type
          required:
            - spec
