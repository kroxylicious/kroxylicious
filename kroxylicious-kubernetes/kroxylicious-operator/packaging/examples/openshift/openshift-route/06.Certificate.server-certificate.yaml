---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: server-certificate
  namespace: my-proxy
spec:
  commonName: proxy
  secretName: server-certificate
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 4096
  dnsNames:
    - my-cluster-bootstrap.apps.example.com
    - my-cluster-0.apps.example.com
    - my-cluster-1.apps.example.com
    - my-cluster-2.apps.example.com
  usages:
    - server auth
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
