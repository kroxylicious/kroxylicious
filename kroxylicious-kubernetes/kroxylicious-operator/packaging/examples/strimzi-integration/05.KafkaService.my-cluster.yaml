---
kind: KafkaService
apiVersion: kroxylicious.io/v1alpha1
metadata:
  name: my-cluster
  namespace: my-proxy
spec:
  strimziKafkaRef:
    kind: Kafka
    group: kafka.strimzi.io
    name: my-cluster
    listenerName: tls
    trustStrimziCaCertificate: true
  nodeIdRanges:
    - start: 0
      end: 2
