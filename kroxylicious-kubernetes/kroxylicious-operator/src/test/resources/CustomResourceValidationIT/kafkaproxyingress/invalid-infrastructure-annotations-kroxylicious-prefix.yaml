---
resource:
  kind: KafkaProxyIngress
  apiVersion: kroxylicious.io/v1alpha1
  metadata:
    name: test-ingress
    namespace: proxy-ns
  spec:
    proxyRef:
      name: "my-proxy"
    infrastructure:
      annotations:
        "kroxylicious.io/some-annotation": "value"
    clusterIP:
      protocol: TLS
expectFailureMessageToContain: "annotations with the 'kroxylicious.io/' prefix are reserved for operator use"
