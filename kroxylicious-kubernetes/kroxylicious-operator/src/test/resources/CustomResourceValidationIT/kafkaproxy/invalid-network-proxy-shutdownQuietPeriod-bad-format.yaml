---
resource:
  kind: KafkaProxy
  apiVersion: kroxylicious.io/v1alpha1
  metadata:
    name: invalid-network-duration
    namespace: proxy-ns
  spec:
    network:
      proxy:
        shutdownQuietPeriod: "PT2S"
expectFailureMessageToContain: |-
  spec.network.proxy.shutdownQuietPeriod
