---
kind: KroxyliciousSidecarConfig
apiVersion: sidecar.kroxylicious.io/v1alpha1
metadata:
  name: tls-config
  namespace: webhook-validation-test
spec:
  virtualClusters:
    - name: secure-cluster
      targetBootstrapServers: kafka-secure.example.com:9093
      targetClusterTls:
        trustAnchorSecretRef:
          name: kafka-ca-bundle
          key: ca.crt
