name: "Lint Pull Request"

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      only_docs_changed: ${{ steps.check.outputs.only_matching_files_changed }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: 'Detect non-documentation changes'
        id: check
        run: scripts/only-matching-files-changed.sh '\.md$' # licence:check reads .adoc files

  lint:
    needs: check_changes
    if: needs.check_changes.outputs.only_docs_changed == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Test for Slack secret'
        env:
          KROXYLICIOUS_SLACK_WEBHOOK: ${{ secrets.KROXYLICIOUS_SLACK_WEBHOOK }}
        run: |
          echo "SLACK_WEBHOOK_SET=$(test ${KROXYLICIOUS_SLACK_WEBHOOK} && echo true)" >> $GITHUB_ENV
      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Compile and lint the project'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This is the authoritative QA check for all PRs. Explicitly enable the qa profile.
          # ErrorProne automatically activates on JDK 17+ (errorprone-jdk-compatible profile).
          # All quality checks run: formatting, licensing, checkstyle, spotbugs, dependency analysis, enforcer, errorprone.
          # Other workflows skip QA to avoid duplication.
          mvn --batch-mode \
            --activate-profiles ci,qa \
            --threads 1.5C \
            -DskipTests \
            -Djapicmp.skip=true \
            verify
      - name: 'Validate POM metadata for Central Portal'
        run: |
          mvn --batch-mode --quiet help:effective-pom -Doutput=target/effective-pom.xml
          mvn --batch-mode --quiet -pl kroxylicious-bom help:effective-pom -Doutput=target/effective-pom.xml
          # +1 for the root reactor pom, which appears in the effective-pom but is not declared as a <module> anywhere
          expected=$(( $(grep -h -r --include="pom.xml" "<module>" . | grep -v target | sort | uniq | wc -l) + 1 ))
          python3 scripts/validate_pom_metadata.py target/effective-pom.xml "$expected"
          python3 scripts/validate_pom_metadata.py kroxylicious-bom/target/effective-pom.xml
      - name: Save PR number to file
        run: echo ${{ github.event.number }} > PR_NUMBER.txt
      - name: Archive PR number
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: PR_NUMBER
          path: PR_NUMBER.txt
