name: System Tests

on:
  workflow_dispatch:
    inputs: &workflow-inputs
      kafkaClient:
        description: "Kafka client to be used"
        default: "strimzi_test_client"
        required: false
        type: string
      groups:
        description: "Groups to be included in test run"
        required: false
        type: string
      excludedGroups:
        description: "Groups to be excluded from test run"
        required: false
        type: string
      testFortanixKMS:
        description: "Run Fortanix KMS tests"
        default: 'false'
        required: false
        type: string
  workflow_call:
    inputs: *workflow-inputs

jobs:
  build_artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Build Kroxylicious proxy system tests'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The 'dist' profile builds the kroxylicious-operator artefact. This is needed by the systemtests.
          mvn --batch-mode \
            --activate-profiles 'dist,!qa' \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -DskipDocs=true \
            -DskipContainerImageBuild \
            -Derrorprone.skip=true \
            install
      - name: 'Package Kroxylicious Maven artifacts'
        run: |
          mkdir -p /tmp/kroxylicious-artifacts
          cd "$HOME/.m2/repository"
          tar czf /tmp/kroxylicious-artifacts/maven-repo.tar.gz io/kroxylicious
      - name: 'Upload Kroxylicious Maven artifacts'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-maven-artifacts
          path: /tmp/kroxylicious-artifacts/maven-repo.tar.gz
          retention-days: 1

  discover_system_test_chunks:
    runs-on: ubuntu-latest
    outputs:
      test_chunks: ${{ steps.discover.outputs.test_chunks }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: 'Discover STs'
        working-directory: kroxylicious-systemtests
        id: discover
        run: |
          TEST_CHUNKS="[$(find . -type f -name "*ST.java" -exec basename {} .java \; | sed 's/.*/"&"/' | sed -z 's/\n/,/g;s/,$/\n/')]"
          echo "test_chunks=$TEST_CHUNKS" >> $GITHUB_OUTPUT

  run_system_tests:
    needs: [build_artifacts, discover_system_test_chunks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tests: ${{ fromJson(needs.discover_system_test_chunks.outputs.test_chunks) }}

    steps:
      - name: Log tests to run
        run: echo "Running tests on classes '${{ matrix.tests }}'"
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: Setup Minikube
        uses: ./.github/actions/common/setup-minikube
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Download Kroxylicious Maven artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: kroxylicious-maven-artifacts
          path: /tmp/kroxylicious-artifacts
      - name: Download kroxylicious proxy container artifact
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732
        with:
          workflow: build_kroxylicious_images
          name: kroxylicious-proxy
          run_id: ${{github.run_id}}
      - name: Download kroxylicious operator container artifact
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732
        with:
          workflow: build_kroxylicious_images
          name: kroxylicious-operator
          run_id: ${{github.run_id}}
      - name: 'Extract Kroxylicious Maven artifacts'
        run: |
          mkdir -p "$HOME/.m2/repository"
          cd "$HOME/.m2/repository"
          tar xzf /tmp/kroxylicious-artifacts/maven-repo.tar.gz
      - name: 'Load Kroxylicious Operand Docker Image in Minikube'
        run: |
          minikube image load kroxylicious-proxy.img.tar.gz
          minikube image load kroxylicious-operator.img.tar.gz
          
          # https://github.com/kubernetes/minikube/issues/21393 - minikube image load doesn't fail if the load fails.
          KROXYLICIOUS_PROXY_IMAGE="$(mvn --quiet --projects kroxylicious-app --activate-profiles dist org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=io.kroxylicious.proxy.image.name -DforceStdout)"
          KROXYLICIOUS_OPERATOR_IMAGE="$(mvn --quiet --projects kroxylicious-operator --activate-profiles dist org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=io.kroxylicious.operator.image.name -DforceStdout)"
          KROXYLICIOUS_VERSION="$(mvn --quiet org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version -DforceStdout)"
          minikube image tag ${KROXYLICIOUS_PROXY_IMAGE} quay.io/kroxylicious/kroxylicious:${KROXYLICIOUS_VERSION}          
          minikube image ls | grep --fixed-strings quay.io/kroxylicious/kroxylicious:${KROXYLICIOUS_VERSION}
          minikube image ls | grep --fixed-strings ${KROXYLICIOUS_OPERATOR_IMAGE}

      - name: 'Run system tests'
        id: run_system_tests
        timeout-minutes: 90
        working-directory: kroxylicious-systemtests
        env:
          KROXYLICIOUS_KMS_FORTANIX_API_ENDPOINT: ${{ format('{0}', inputs.testFortanixKMS) == 'true' && vars.KROXYLICIOUS_KMS_FORTANIX_API_ENDPOINT || '' }}
          KROXYLICIOUS_KMS_FORTANIX_ADMIN_API_KEY: ${{ format('{0}', inputs.testFortanixKMS) == 'true' && secrets.KROXYLICIOUS_KMS_FORTANIX_ADMIN_API_KEY || '' }}
          KROXYLICIOUS_KMS_FORTANIX_API_KEY: ${{ format('{0}', inputs.testFortanixKMS) == 'true' && secrets.KROXYLICIOUS_KMS_FORTANIX_API_KEY || '' }}
          KAFKA_CLIENT: ${{ inputs.kafkaClient }}
          GROUPS_OPT: ${{ inputs.groups != '' && format('-Dgroups={0}', inputs.groups) || '' }}
          TESTS_OPT: ${{ matrix.tests != '' && format('-Dtest={0}',  matrix.tests)  || '' }}
          EXCLUDED_GROUPS_OPT: ${{ inputs.excludedGroups != '' && format('-DexcludedGroups={0}', inputs.excludedGroups) || '' }}
        run: |
          # Run the tests from the ./kroxylicious-systemtest directory
          # This avoids mvn compiling the other modules.
          # Dependencies (including Kroxylicious's own jars and operator artefact) will be got from .m2/repo
          # QA & errorprone are disabled to avoid any unnecessary work
          mvn --batch-mode \
            --activate-profiles 'systemtest,!qa' \
            -Derrorprone.skip=true \
            $TESTS_OPT \
            $EXCLUDED_GROUPS_OPT \
            $GROUPS_OPT \
            verify

      - name: Archive JUnit test results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: junit-results-${{ matrix.tests }}-${{ inputs.kafkaClient }}
          path: kroxylicious-systemtests/target/surefire-reports/**/TEST-*.xml
          if-no-files-found: ignore

      - name: Archive systemtest logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: systemtest-logs-${{ matrix.tests }}-${{ inputs.kafkaClient }}
          path: kroxylicious-systemtests/target/logs

      - name: Test Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
        if: ${{ !cancelled() }}
        with:
          artifact: junit-results-${{ matrix.tests }}-${{ inputs.kafkaClient }}
          name: SystemTests-${{ matrix.tests }}-${{ inputs.kafkaClient }}
          path: '*.xml'
          reporter: java-junit
          fail-on-empty: 'false'

  system_tests_proxy:
    runs-on: ubuntu-latest
    needs: run_system_tests
    if: always()
    permissions:
      actions: read
    steps:
      - name: 'Check all matrix builds'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED_JSON=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '.jobs[] | select(.conclusion=="failure") | {name: .name, url: .html_url}')
          if [ -z "$FAILED_JSON" ]; then
            echo "All jobs passed!" >> $GITHUB_STEP_SUMMARY
            echo "No failures detected."
            exit 0
          fi
          echo "Failed Matrix Jobs" >> $GITHUB_STEP_SUMMARY
          echo "The following instances failed:"
          echo "$FAILED_JSON" | jq -r '"* [\(.name)](\(.url))"' >> $GITHUB_STEP_SUMMARY
          echo "$FAILED_JSON" | jq -r '"\(.name): \(.url)"'
          exit 1
