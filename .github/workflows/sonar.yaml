name: Sonar Scan

on:
  workflow_run:
    workflows: [ "Lint Pull Request" ]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  Sonar:
    runs-on: ubuntu-latest
    if: github.event.workflow_run && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 'Test for Sonar secret'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SONAR_TOKEN_SET=$(test ${SONAR_TOKEN} && echo true)" >> $GITHUB_ENV
      - name: Download PR number artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151
        if: env.SONAR_TOKEN_SET == 'true'
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: PR_NUMBER
      - name: Read PR_NUMBER.txt
        id: pr_number
        uses: juliangruber/read-file-action@271ff311a4947af354c6abcd696a306553b9ec18
        if: env.SONAR_TOKEN_SET == 'true'
        with:
          path: ./PR_NUMBER.txt
      - name: Request GitHub API for PR data
        uses: octokit/request-action@b66ca9cd744693e9c29b490fc08831ab66c4a970
        if: env.SONAR_TOKEN_SET == 'true'
        id: get_pr_data
        with:
          route: GET /repos/${{env.full_name}}/pulls/${{env.pr_number}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ steps.pr_number.outputs.content }}
          full_name: ${{ github.event.repository.full_name }}
      - name: "Check for legal branch names"
        id: set_branch_name
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [[ ${HEAD_BRANCH} =~ [\(\$\)\;]+ ]];
          then
            echo "BRANCH '${HEAD_BRANCH}' contains potentially malicious characters as it matches BRANCH_REGEX '${BRANCH_REGEX}'"
            exit 1
          else
            echo "SANITIZED_HEAD_REF=${HEAD_BRANCH}" >> $GITHUB_ENV
          fi
        shell: bash
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: env.SONAR_TOKEN_SET == 'true'
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{env.SANITIZED_HEAD_REF}}
          fetch-depth: 0
          allow-unsafe-pr-checkout: true
      - name: Checkout base branch
        if: env.SONAR_TOKEN_SET == 'true'
        run: |
          git remote add upstream ${{ github.event.repository.clone_url }}
          git fetch upstream
          git checkout -B ${{ fromJson(steps.get_pr_data.outputs.data).base.ref }} upstream/${{ fromJson(steps.get_pr_data.outputs.data).base.ref }}
          git checkout "origin/${{env.SANITIZED_HEAD_REF}}"
          git clean -ffdx && git reset --hard HEAD
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
        if: env.SONAR_TOKEN_SET == 'true'
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
        if: env.SONAR_TOKEN_SET == 'true'
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: Cache SonarCloud packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        if: env.SONAR_TOKEN_SET == 'true'
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Preinstall prior to SonarCloud scan
        if: env.SONAR_TOKEN_SET == 'true'
        run: |
          mvn --batch-mode \
            --activate-profiles 'ci,!qa' \
            -Derrorprone.skip=true \
            -DskipITs=true \
            -DskipTests \
            install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: SonarCloud scan on PR for the Proxy Runtime
        if: env.SONAR_TOKEN_SET == 'true'
        run: |
          mvn --batch-mode \
            --activate-profiles 'ci,!qa' \
            --projects '!:kroxylicious-operator,!:kroxylicious-operator-dist,!:kroxylicious-kubernetes-api,!:kroxylicious-operator-test-support' \
            -Derrorprone.skip=true \
            -DskipITs=true \
            -Djapicmp.skip=true \
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }} \
            -Dsonar.pullrequest.key=${{ fromJson(steps.get_pr_data.outputs.data).number }} \
            -Dsonar.pullrequest.branch=${{ fromJson(steps.get_pr_data.outputs.data).head.ref }} \
            -Dsonar.pullrequest.base=${{ fromJson(steps.get_pr_data.outputs.data).base.ref }} \
            clean \
            verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: SonarCloud scan on PR for the Operator
        if: env.SONAR_TOKEN_SET == 'true'
        run: |
          PROJECTS=':kroxylicious-operator,:kroxylicious-parent,:kroxylicious-operator-dist'
          if [ -f "kroxylicious-kubernetes/pom.xml" ]; then
            PROJECTS=":kroxylicious-operator,:kroxylicious-operator-test-support,:kroxylicious-kubernetes-parent,:kroxylicious-parent,:kroxylicious-operator-dist"
          fi
          mvn --batch-mode \
            --activate-profiles 'ci,!qa' \
            --projects "$PROJECTS" \
            -Derrorprone.skip=true \
            -DskipITs=true \
            -Djapicmp.skip=true \
            -Dsonar.projectName='Kroxylicious Operator' \
            -Dsonar.projectKey='kroxylicious_operator' \
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }} \
            -Dsonar.pullrequest.key=${{ fromJson(steps.get_pr_data.outputs.data).number }} \
            -Dsonar.pullrequest.branch=${{ fromJson(steps.get_pr_data.outputs.data).head.ref }} \
            -Dsonar.pullrequest.base=${{ fromJson(steps.get_pr_data.outputs.data).base.ref }} \
            clean \
            verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
