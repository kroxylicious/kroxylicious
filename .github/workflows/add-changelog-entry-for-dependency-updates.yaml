name: Add changelog entry for user-facing dependency updates

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  add-changelog-entry:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Check for changelog token'
        env:
          KROXYLICIOUS_CHANGELOG_TOKEN: ${{ secrets.KROXYLICIOUS_CHANGELOG_TOKEN }}
        run: |
          echo "CHANGELOG_TOKEN_SET=$(test ${KROXYLICIOUS_CHANGELOG_TOKEN} && echo true)" >> $GITHUB_ENV

      - name: 'Check out repository'
        if: env.CHANGELOG_TOKEN_SET == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.KROXYLICIOUS_CHANGELOG_TOKEN }}

      - name: 'Check whether changelog entry is needed'
        if: env.CHANGELOG_TOKEN_SET == 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Extract the bumped package from the Dependabot PR title.
          # Two formats exist:
          #   Artifact form:  "bump groupId:artifactId from X to Y"
          #   Property form:  "bump lowkey.version from X to Y"
          PACKAGE=$(echo "${PR_TITLE}" | grep -oP 'bump \K\S+(?= from)' || true)
          if [[ -z "${PACKAGE}" ]]; then
            echo "SKIP_ENTRY=false" >> $GITHUB_ENV
            exit 0
          fi
          if [[ "${PACKAGE}" == *"/"* ]]; then
            echo "Skipping changelog entry: ${PACKAGE} is a GitHub Actions version update."
            echo "SKIP_ENTRY=true" >> $GITHUB_ENV
            exit 0
          fi
          if python3 .github/scripts/is-user-facing-dependency.py "${PACKAGE}"; then
            echo "SKIP_ENTRY=false" >> $GITHUB_ENV
          else
            echo "SKIP_ENTRY=true" >> $GITHUB_ENV
          fi

      - name: 'Create logchange entry'
        if: env.CHANGELOG_TOKEN_SET == 'true' && env.SKIP_ENTRY != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ENTRY="changelog/unreleased/${PR_NUMBER}-dependency-update.yaml"
          if [[ -f "${ENTRY}" ]]; then
            echo "Changelog entry already exists, skipping."
            exit 0
          fi
          cat > "${ENTRY}" <<EOF
          title: "${PR_TITLE}"
          type: build
          merge_requests:
            - ${PR_NUMBER}
          EOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog/unreleased/
          git commit --message "build: add changelog entry for #${PR_NUMBER}" --signoff
          git push
