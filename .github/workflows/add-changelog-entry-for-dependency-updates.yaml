name: Add changelog entry for dependency updates

on:
  pull_request:
    types: [opened]

jobs:
  add-changelog-entry:
    if: github.actor == 'renovate[bot]' || github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.KROXYLICIOUS_CHANGELOG_TOKEN }}

      - name: 'Create logchange entry'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          cat > changelog/unreleased/${PR_NUMBER}-dependency-update.yaml <<EOF
          title: "${PR_TITLE}"
          type: build
          merge_requests:
            - ${PR_NUMBER}
          EOF

      - name: 'Commit entry'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog/unreleased/
          git commit --message "build: add changelog entry for #${PR_NUMBER}" --signoff
          git push
