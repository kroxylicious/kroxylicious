name: Check CHANGELOG not manually modified

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'CHANGELOG.md'

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 'Fail if CHANGELOG.md was modified directly'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed(
              'CHANGELOG.md must not be edited directly.\n' +
              'Add a logchange entry YAML file to changelog/unreleased/ instead.\n' +
              'See DEV_GUIDE.md#changelog-entries for the format. ' +
              'CHANGELOG.md is regenerated automatically at release time.'
            )
