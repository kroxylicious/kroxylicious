name: Build Kroxylicious Artifacts

on:
  workflow_call:

jobs:
  build_kroxylicious_images:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Build Kroxylicious Operator/Operand Container Images & Operator Zip'
        run: |
          mvn --quiet \
            --batch-mode \
            --activate-profiles 'dist,!qa' \
            --also-make \
            --projects :kroxylicious-app,:kroxylicious-operator,:kroxylicious-operator-dist,:kroxylicious-admission \
            -Derrorprone.skip=true \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -DskipDocs=true \
            package
      - name: 'Archive kroxylicious proxy image'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-proxy
          path: kroxylicious-app/target/kroxylicious-proxy.img.tar.gz
          retention-days: 1
      - name: 'Archive kroxylicious operator image'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-operator
          path: kroxylicious-kubernetes/kroxylicious-operator/target/kroxylicious-operator.img.tar.gz
          retention-days: 1
      - name: 'Archive kroxylicious admission webhook image'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-admission-webhook
          path: kroxylicious-kubernetes/kroxylicious-admission/target/kroxylicious-webhook.img.tar.gz
          retention-days: 1

  build_artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Build Kroxylicious maven artifacts'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The 'dist' profile builds the kroxylicious-operator artifact. This is needed by the systemtests.
          mvn --batch-mode \
            --activate-profiles 'dist,!qa' \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -DskipDocs=true \
            -DskipContainerImageBuild \
            -Derrorprone.skip=true \
            install
      - name: 'Package Kroxylicious Maven artifacts'
        run: |
          mkdir -p /tmp/kroxylicious-artifacts
          cd "$HOME/.m2/repository"
          tar czf /tmp/kroxylicious-artifacts/maven-repo.tar.gz io/kroxylicious
      - name: 'Upload Kroxylicious Maven artifacts'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-maven-artifacts
          path: /tmp/kroxylicious-artifacts/maven-repo.tar.gz
          retention-days: 1
