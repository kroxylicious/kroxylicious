name: "Run Kroxylicious Proxy Integration Tests"

on:
  push:
    branches: [ main, 'release/**' ]
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  discover_integration_test_chunks:
    runs-on: ubuntu-latest
    outputs:
      test_chunks: ${{ steps.discover.outputs.test_chunks }}
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: 'Discover ITs'
        id: discover
        run: |
          TESTS_PER_CHUNK=15
          TEST_CHUNKS=$(./scripts/discover-integration-tests.sh ${TESTS_PER_CHUNK})

          # Extract unique modules from the chunks JSON
          # Parse "module:TestClass" format and get unique module artifact IDs (basename)
          DISCOVERED_MODULES=$(echo "$TEST_CHUNKS" | jq -r '.[]' \
            | tr ',' '\n' \
            | cut -d: -f1 \
            | xargs -n 1 basename \
            | sort -u \
            | sed 's|^|:|' \
            | tr '\n' ',' \
            | sed 's/,$//')

          # Always include BOM as it's required for dependency management
          # Also include filter-archetype as it has special IT requirements
          # Also include kroxylicious-app to build operand container image for operator ITs
          MODULES=":kroxylicious-bom,:kroxylicious-filter-archetype,:kroxylicious-app,${DISCOVERED_MODULES}"

          echo "test_chunks=$TEST_CHUNKS" >> $GITHUB_OUTPUT
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Discovered modules: $MODULES"
          echo "Discovered $(echo "$TEST_CHUNKS" | jq -r 'length') test chunks"
  build_artifacts:
    needs: discover_integration_test_chunks
    runs-on: ubuntu-latest
    outputs:
      kroxylicious_image: ${{ steps.build_image.outputs.KROXYLICIOUS_IMAGE }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Build Kroxylicious modules with integration tests and operand image'
        id: build_image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GIT_HASH="$(git rev-parse HEAD)"
          KROXYLICIOUS_VERSION="$(mvn org.apache.maven.plugins:maven-help-plugin:3.4.0:evaluate -Dexpression=project.version -q -DforceStdout)"
          KROXYLICIOUS_IMAGE="quay.io/kroxylicious/proxy:${KROXYLICIOUS_VERSION}-${GIT_HASH}"

          echo "Building modules: ${{ needs.discover_integration_test_chunks.outputs.modules }}"
          echo "Building operand image: ${KROXYLICIOUS_IMAGE}"

          mvn --batch-mode \
            --activate-profiles 'dist,!qa' \
            --projects ${{ needs.discover_integration_test_chunks.outputs.modules }} \
            --also-make \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -DskipDocs=true \
            -Derrorprone.skip=true \
            -Dio.kroxylicious.proxy.image.name="${KROXYLICIOUS_IMAGE}" \
            install

          echo "KROXYLICIOUS_IMAGE=${KROXYLICIOUS_IMAGE}" >> "$GITHUB_OUTPUT"
      - name: 'Upload Operand Image Artifact'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-operand-image
          path: kroxylicious-app/target/kroxylicious-proxy.img.tar.gz
          retention-days: 1
      - name: 'Package Kroxylicious Maven artifacts'
        run: |
          mkdir -p /tmp/kroxylicious-artifacts
          cd "$HOME/.m2/repository"
          tar czf /tmp/kroxylicious-artifacts/maven-repo.tar.gz io/kroxylicious
      - name: 'Upload Kroxylicious Maven artifacts'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kroxylicious-maven-artifacts
          path: /tmp/kroxylicious-artifacts/maven-repo.tar.gz
          retention-days: 1
  run_integration_tests:
    needs: [build_artifacts, discover_integration_test_chunks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tests: ${{ fromJson(needs.discover_integration_test_chunks.outputs.test_chunks) }}
    steps:
      - name: Parse test specifications
        id: parse
        run: |
          CHUNK="${{ matrix.tests }}"
          echo "Processing chunk: $CHUNK"

          # Extract module from first test (all tests in chunk are from same module)
          FIRST_SPEC=$(echo "$CHUNK" | cut -d, -f1)
          MODULE=$(echo "$FIRST_SPEC" | cut -d: -f1)

          # Remove "module:" prefix from all tests
          TEST_LIST=$(echo "$CHUNK" | sed "s|${MODULE}:||g")

          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "tests=$TEST_LIST" >> $GITHUB_OUTPUT

      - name: Log tests to run
        run: echo "Running tests '${{ steps.parse.outputs.tests }}' in module '${{ steps.parse.outputs.module }}'"
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Download Kroxylicious Maven artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: kroxylicious-maven-artifacts
          path: /tmp/kroxylicious-artifacts
      - name: 'Extract Kroxylicious Maven artifacts'
        run: |
          mkdir -p "$HOME/.m2/repository"
          cd "$HOME/.m2/repository"
          tar xzf /tmp/kroxylicious-artifacts/maven-repo.tar.gz
      - name: Check if operator tests in chunk
        id: check_operator
        env:
          CHUNK: ${{ matrix.tests }}
        run: |
          if echo "$CHUNK" | grep -q "kroxylicious-kubernetes/kroxylicious-operator:"; then
            echo "has_operator_tests=true" >> "$GITHUB_OUTPUT"
            echo "This chunk contains operator tests - Minikube will be started"
          else
            echo "has_operator_tests=false" >> "$GITHUB_OUTPUT"
            echo "This chunk has no operator tests - Minikube will be skipped"
          fi
      - name: Set up Docker Buildx
        if: steps.check_operator.outputs.has_operator_tests == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Setup Minikube
        if: steps.check_operator.outputs.has_operator_tests == 'true'
        uses: ./.github/actions/common/setup-minikube
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Operand Image Artifact
        if: steps.check_operator.outputs.has_operator_tests == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: kroxylicious-operand-image
          path: /tmp/kroxylicious-operand
      - name: Load Operand Image in Minikube
        if: steps.check_operator.outputs.has_operator_tests == 'true'
        env:
          KROXYLICIOUS_IMAGE: ${{ needs.build_artifacts.outputs.kroxylicious_image }}
        run: |
          # Load image into Minikube
          minikube image load /tmp/kroxylicious-operand/kroxylicious-proxy.img.tar.gz

          # Verify load succeeded (minikube image load exits 0 even on failure - see operator-maven.yaml:69-71)
          minikube image ls | grep --fixed-strings "${KROXYLICIOUS_IMAGE}"

          # Set environment variable for tests
          echo "KROXYLICIOUS_IMAGE=${KROXYLICIOUS_IMAGE}" >> "${GITHUB_ENV}"
      - name: 'Run integration tests'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # These variables/secrets support the Fortanix/KMS integration tests.   If the secrets are absent, the
          # tests will be skipped.
          KROXYLICIOUS_KMS_FORTANIX_API_ENDPOINT: ${{ vars.KROXYLICIOUS_KMS_FORTANIX_API_ENDPOINT }}
          KROXYLICIOUS_KMS_FORTANIX_ADMIN_API_KEY: ${{ secrets.KROXYLICIOUS_KMS_FORTANIX_ADMIN_API_KEY }}
          KROXYLICIOUS_KMS_FORTANIX_API_KEY: ${{ secrets.KROXYLICIOUS_KMS_FORTANIX_API_KEY }}
        working-directory: ${{ steps.parse.outputs.module }}
        run: |
          mvn --batch-mode \
            --activate-profiles '!qa' \
            -DskipUTs \
            -Derrorprone.skip=true \
            -Dit.test="${{ steps.parse.outputs.tests }}" \
            verify
  integration_test_filter_archetype:
    needs: build_artifacts
    runs-on: ubuntu-latest
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: 'Download Kroxylicious Maven artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: kroxylicious-maven-artifacts
          path: /tmp/kroxylicious-artifacts
      - name: 'Extract Kroxylicious Maven artifacts'
        run: |
          mkdir -p "$HOME/.m2/repository"
          cd "$HOME/.m2/repository"
          tar xzf /tmp/kroxylicious-artifacts/maven-repo.tar.gz
      - name: 'run filter archetype integration tests'
        working-directory: kroxylicious-filter-archetype
        run: mvn -B verify
  integration_test_proxy:
    runs-on: ubuntu-latest
    needs: [run_integration_tests, integration_test_filter_archetype]
    if: always()
    permissions:
      actions: read
    steps:
    - name: 'Check all matrix builds'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        FAILED_JSON=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
          --jq '.jobs[] | select(.conclusion=="failure") | {name: .name, url: .html_url}')
        if [ -z "$FAILED_JSON" ]; then
          echo "All jobs passed!" >> $GITHUB_STEP_SUMMARY
          echo "No failures detected."
          exit 0
        fi
        echo "Failed Matrix Jobs" >> $GITHUB_STEP_SUMMARY
        echo "The following instances failed:"
        echo "$FAILED_JSON" | jq -r '"* [\(.name)](\(.url))"' >> $GITHUB_STEP_SUMMARY
        echo "$FAILED_JSON" | jq -r '"\(.name): \(.url)"'
        exit 1