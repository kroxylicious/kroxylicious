name: Build Kroxylicious Operator

on:
  push:
    branches: [ main, 'release/**' ]
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      only_docs_changed: ${{ steps.check.outputs.only_matching_files_changed }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2

      - name: 'Detect non-documentation changes'
        id: check
        run: scripts/only-matching-files-changed.sh '\.(md|adoc)$'

  build_operator:
    needs: check_changes
    if: needs.check_changes.outputs.only_docs_changed == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Test for Sonar secret'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SONAR_TOKEN_SET=$(test ${SONAR_TOKEN} && echo true)" >> $GITHUB_ENV
      - name: 'Test for Slack secret'
        env:
          KROXYLICIOUS_SLACK_WEBHOOK: ${{ secrets.KROXYLICIOUS_SLACK_WEBHOOK }}
        run: |
          echo "SLACK_WEBHOOK_SET=$(test ${KROXYLICIOUS_SLACK_WEBHOOK} && echo true)" >> $GITHUB_ENV
      - name: 'Check out repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: ./.github/actions/common/setup-java
      - name: 'Cache Maven packages'
        uses: ./.github/actions/common/cache-maven-packages
      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: github.ref_name == 'main' && env.SONAR_TOKEN_SET == 'true'
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: 'Build & test Kroxylicious operator'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode \
            --activate-profiles 'ci,!qa' \
            --projects ':kroxylicious-operator' \
            --also-make \
            -Derrorprone.skip=true \
            -Djapicmp.skip=true \
            -DskipITs=true \
            install
      - name: 'SonarCloud scan on main for the Operator'
        if: github.event_name == 'push' && github.ref_name == 'main' && env.SONAR_TOKEN_SET == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode \
            --activate-profiles 'ci,!qa' \
            --projects ':kroxylicious-operator,:kroxylicious-operator-dist,:kroxylicious-kubernetes-api,:kroxylicious-operator-test-support,:kroxylicious-kubernetes-parent,:kroxylicious-parent' \
            -Derrorprone.skip=true \
            -Djapicmp.skip=true \
            -DskipITs=true \
            -Dsonar.projectName='Kroxylicious Operator' \
            -Dsonar.projectKey='kroxylicious_operator' \
            verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
      - name: Save PR number to file
        if: github.event_name == 'pull_request'
        run: echo ${{ github.event.number }} > PR_NUMBER.txt
      - name: Archive PR number
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: PR_NUMBER
          path: PR_NUMBER.txt
      - name: Slack Notification on Failure
        if: failure() && env.SLACK_WEBHOOK_SET == 'true' && github.event_name == 'push'
        uses: ./.github/actions/common/slack-notification
        with:
          slackWebhook: ${{ secrets.KROXYLICIOUS_SLACK_WEBHOOK }}
          slackTitle: 'Failure Alert: ${{ github.repository }}'
          slackMessage: 'The operator maven workflow failed on branch ${{ github.ref_name }}.'
          serverUrl: ${{ github.server_url }}
          repository: ${{ github.repository }}
          runId: ${{ github.run_id }}
